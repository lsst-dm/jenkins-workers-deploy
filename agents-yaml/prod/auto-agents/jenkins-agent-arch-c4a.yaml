apiVersion: v1
kind: Pod
metadata:
  annotations:
  labels:
    app: idf-agent-ldfc-arch-c4a
  name: idf-agent-ldfc-arch-c4a
  namespace: jenkins
  ownerReferences:
spec:
  containers:
  - args:
    - --host=tcp://localhost:2375
    - --mtu=1376
    command:
    - /usr/local/bin/dockerd
    env:
    - name: DOCKER_HOST
      value: tcp://localhost:2375
    image: docker:27.1.1-dind
    imagePullPolicy: Always
    livenessProbe:
      exec:
        command:
        - wget
        - --spider
        - -q
        - http://localhost:2375/_ping
      failureThreshold: 2
      initialDelaySeconds: 5
      periodSeconds: 5
      successThreshold: 1
      timeoutSeconds: 1
    name: dind
    readinessProbe:
      exec:
        command:
        - wget
        - --spider
        - -q
        - http://localhost:2375/_ping
      failureThreshold: 2
      initialDelaySeconds: 5
      periodSeconds: 5
      successThreshold: 1
      timeoutSeconds: 1
    resources:
      limits:
        cpu: "12"
        memory: 64Gi
      requests:
        cpu: "12"
        memory: 64Gi
        ephemeral-storage: 150Gi
    securityContext:
      allowPrivilegeEscalation: true
      privileged: true
      readOnlyRootFilesystem: false
      runAsGroup: 0
      runAsNonRoot: false
      runAsUser: 0
    terminationMessagePath: /dev/termination-log
    terminationMessagePolicy: File
    volumeMounts:
    - mountPath: /var/lib/docker
      name: docker-graph-storage
    - mountPath: /j
      name: volume-aarch
    - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      name: kube-api-access-p9jsc
      readOnly: true
  - command:
    - sh
    - -c
    - while true; do /usr/local/bin/docker-gc; sleep $GRACE_PERIOD_SECONDS; done
    env:
    - name: DOCKER_HOST
      value: tcp://localhost:2375
    - name: GRACE_PERIOD_SECONDS
      value: "3600"
    - name: MINIMUM_IMAGES_TO_SAVE
      value: "5"
    - name: REMOVE_VOLUMES
      value: "1"
    - name: FORCE_CONTAINER_REMOVAL
      value: "1"
    - name: FORCE_IMAGE_REMOVAL
      value: "1"
    image: ghcr.io/lsst-dm/docker-docker-gc:latest
    imagePullPolicy: Always
    name: docker-gc
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 500m
        memory: 512Mi
    securityContext:
      allowPrivilegeEscalation: true
      privileged: false
      readOnlyRootFilesystem: false
      runAsGroup: 0
      runAsNonRoot: false
      runAsUser: 0
    terminationMessagePath: /dev/termination-log
    terminationMessagePolicy: File
    volumeMounts:
    - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      name: kube-api-access-p9jsc
      readOnly: true
  - name: jnlp
    image: ghcr.io/lsst-dm/jenkins-jnlp-client:latest
    workingDir: /j
    args: ["$(JENKINS_SECRET)", "$(JENKINS_NAME)"]
    env:
      - name: DOCKER_HOST
        value: tcp://localhost:2375
      - name: K8S_NODE_NAME
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: spec.nodeName
      - name: K8S_POD_NAMESPACE
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: metadata.namespace
      - name: K8S_POD_IP
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: status.podIP
      - name: AGENT_WORKDIR
        value: /j
    tty: true
    volumeMounts:
      - name: docker-graph-storage
        mountPath: /var/lib/docker
      - name: volume-aarch
        mountPath: /j
    securityContext:
      allowPrivilegeEscalation: true
      privileged: false
      readOnlyRootFilesystem: false
      runAsGroup: 1000
      runAsNonRoot: false
      runAsUser: 1000
    resources:
      limits:
        cpu: "8"
        memory: 64Gi
      requests:
        cpu: "8"
        memory: 64Gi
    terminationMessagePath: /dev/termination-log
    terminationMessagePolicy: File
  dnsPolicy: ClusterFirst
  enableServiceLinks: true
  nodeSelector:
    cloud.google.com/gke-nodepool: jenkins-workers-multiarch-c4a
    kubernetes.io/arch: arm64
  preemptionPolicy: PreemptLowerPriority
  priority: 0
  restartPolicy: Always
  schedulerName: default-scheduler
  securityContext:
    fsGroup: 4085
    runAsGroup: 0
    runAsNonRoot: false
    runAsUser: 0
  serviceAccount: default
  serviceAccountName: default
  shareProcessNamespace: false
  terminationGracePeriodSeconds: 30
  tolerations:
  - effect: NoExecute
    key: node.kubernetes.io/not-ready
    operator: Exists
    tolerationSeconds: 300
  - effect: NoExecute
    key: node.kubernetes.io/unreachable
    operator: Exists
    tolerationSeconds: 300
  - effect: NoSchedule
    key: kubernetes.io/arch
    operator: Equal
    value: arm64
  volumes:
  - name: volume-aarch
    emptyDir: {}
  - emptyDir: {}
    name: docker-graph-storage
  - name: kube-api-access-p9jsc
    projected:
      defaultMode: 420
      sources:
      - serviceAccountToken:
          expirationSeconds: 3607
          path: token
      - configMap:
          items:
          - key: ca.crt
            path: ca.crt
          name: kube-root-ca.crt
      - downwardAPI:
          items:
          - fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
            path: namespace