apiVersion: apps/v1
kind: StatefulSet
metadata:
  annotations:
  name: snowflake-dev
  namespace: jenkins-dev
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: Parallel
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: snowflake-dev
  serviceName: ""
  template:
    metadata:
      labels:
        app: snowflake-dev
    spec:
      containers:
      - args:
        - --host=tcp://localhost:2375
        - --mtu=1376
        command:
        - /usr/local/bin/dockerd
        env:
        - name: DOCKER_HOST
          value: tcp://localhost:2375
        image: docker:27.1.1-dind
        imagePullPolicy: Always
        livenessProbe:
          exec:
            command:
            - wget
            - --spider
            - -q
            - http://localhost:2375/_ping
          failureThreshold: 2
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 1
        name: dind
        readinessProbe:
          exec:
            command:
            - wget
            - --spider
            - -q
            - http://localhost:2375/_ping
          failureThreshold: 2
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: "8"
            memory: 64Gi
          requests:
            cpu: "8"
            memory: 64Gi
        securityContext:
          allowPrivilegeEscalation: true
          privileged: true
          readOnlyRootFilesystem: false
          runAsGroup: 0
          runAsNonRoot: false
          runAsUser: 0
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/lib/docker
          name: docker-graph-storage
        - mountPath: /j
          name: ws-snowflake-dev
      - command:
        - sh
        - -c
        - while true; do /usr/local/bin/docker-gc; sleep $GRACE_PERIOD_SECONDS; done
        env:
        - name: DOCKER_HOST
          value: tcp://localhost:2375
        - name: GRACE_PERIOD_SECONDS
          value: "3600"
        - name: MINIMUM_IMAGES_TO_SAVE
          value: "5"
        - name: REMOVE_VOLUMES
          value: "1"
        - name: FORCE_CONTAINER_REMOVAL
          value: "1"
        - name: FORCE_IMAGE_REMOVAL
          value: "1"
        image: ghcr.io/lsst-dm/docker-docker-gc:latest
        imagePullPolicy: Always
        name: docker-gc
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: true
          privileged: false
          readOnlyRootFilesystem: false
          runAsGroup: 0
          runAsNonRoot: false
          runAsUser: 0
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      - env:
        - name: DOCKER_HOST
          value: tcp://localhost:2375
        - name: JENKINS_URL
          value: http://jenkins-dev.jenkins-dev.svc.cluster.local:8080
        - name: JENKINS_TUNNEL
          value: jenkins-dev-agent.jenkins-dev.svc.cluster.local:20000
        - name: JENKINS_AGENT_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: JENKINS_SECRET
          valueFrom:
            secretKeyRef:
              key: jenkins-secret
              name: snowflake-dev-secret
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: K8S_POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        - name: K8S_POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        - name: AGENT_WORKDIR
          value: /j
        image: ghcr.io/lsst-dm/jenkins-jnlp-client:latest
        imagePullPolicy: Always
        name: jnlp
        resources:
          limits:
            cpu: "8"
            memory: 64Gi
          requests:
            cpu: "8"
            memory: 64Gi
        securityContext:
          allowPrivilegeEscalation: true
          privileged: false
          readOnlyRootFilesystem: false
          runAsGroup: 1000
          runAsNonRoot: false
          runAsUser: 1000
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        tty: true
        volumeMounts:
        - mountPath: /var/lib/docker
          name: docker-graph-storage
        - mountPath: /j
          name: ws-snowflake-dev
        workingDir: /j
      dnsPolicy: ClusterFirst
      nodeSelector:
        cloud.google.com/gke-nodepool: jenkins-workers-multiarch-c4a
        kubernetes.io/arch: arm64
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 4085
        runAsGroup: 0
        runAsNonRoot: false
        runAsUser: 0
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      tolerations:
      - effect: NoExecute
        key: workload
        operator: Equal
        value: snowflake
      - effect: NoSchedule
        key: kubernetes.io/arch
        operator: Equal
        value: arm64
      volumes:
      - emptyDir: {}
        name: docker-graph-storage
      - name: ws-snowflake-dev
        persistentVolumeClaim:
          claimName: snowflake-dev-pvc
  updateStrategy:
    type: RollingUpdate