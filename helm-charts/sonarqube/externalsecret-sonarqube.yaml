# NOTE: The remoteRef.key paths below use explicit KV v2 format (secret/data/...).
# If the ClusterSecretStore named "openbao" is configured with path: secret and version: v2,
# ESO may insert /data/ automatically — adjust the keys to sonarqube/<name> if secrets fail to sync.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sonarqube-admin-password
  namespace: sonarqube
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: sonarqube-admin-password
  data:
    - secretKey: password
      remoteRef:
        key: secret/data/sonarqube/admin-password
        property: value
---
