# sonarqube-token is populated post-deploy (see README). ESO retries silently until the path exists.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sonarqube-token
  namespace: sonarqube
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: sonarqube-token
  data:
    - secretKey: token
      remoteRef:
        key: secret/data/sonarqube/jenkins-token
        property: value
